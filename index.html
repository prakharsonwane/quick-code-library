<!DOCTYPE html>
<html>
<head>
    <title>Quick Code Library - Login</title>
    <style>
        body {
            font-family: Arial;
            background: #111827;
            color: white;
            text-align: center;
        }

        .box {
            margin-top: 150px;
            background: #1f2937;
            display: inline-block;
            padding: 30px;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 220px;
            border: none;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        h1 {
            margin-top: 80px;
        }
    </style>
</head>

<body>

<h1>Quick Code Library</h1>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "pranita" && pass === "7777") {
        window.location.href = "editor.html";
    } else {
        alert("Wrong username or password");
    }
}
</script>

</body>
</html>
