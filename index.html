<!DOCTYPE html>
<html>
<head>
    <title>Quick Code Library - Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #e0f2fe, #f8fafc);
            text-align: center;
        }

        h1 {
            margin-top: 80px;
            color: #0f172a;
        }

        .box {
            margin-top: 120px;
            background: white;
            display: inline-block;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: fadeIn 0.8s ease;
        }

        input {
            padding: 12px;
            margin: 10px;
            width: 240px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 5px rgba(59,130,246,0.3);
        }

        button {
            padding: 10px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<h1>⚡ Quick Code Library</h1>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "pranita" && pass === "7777") {
        window.location.href = "editor.html";
    } else {
        alert("Wrong username or password");
    }
}
</script>

</body>
</html>
